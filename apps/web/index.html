<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShipSquares</title>
    <meta name="description" content="ShipSquares — ship faster." />
    <script>
      // Set the theme before first paint (no flash). Mirrors lib/theme.ts.
      try {
        var t = localStorage.getItem("ss-theme");
        if (t !== "dark" && t !== "light")
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        document.documentElement.dataset.theme = t;
        // Density (comfortable default · compact). Mirrors lib/density.ts.
        if (localStorage.getItem("ss-density") === "compact")
          document.documentElement.dataset.density = "compact";
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
